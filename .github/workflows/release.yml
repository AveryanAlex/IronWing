name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            args: ''
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    env:
      IRONWING_APTABASE_KEY: ${{ vars.IRONWING_APTABASE_KEY }}
      IRONWING_APTABASE_HOST: ${{ vars.IRONWING_APTABASE_HOST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libudev-dev \
            libgtk-3-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with Tauri
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('IronWing {0}', github.ref_name) || '' }}
          releaseBody: 'See the assets to download and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Resolve artifact paths
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        id: artifacts
        shell: bash
        run: |
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          echo '${{ steps.tauri.outputs.artifactPaths }}' | jq -r '.[]' >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ironwing-${{ matrix.platform }}${{ contains(matrix.args, 'aarch64') && '-aarch64' || contains(matrix.args, 'x86_64') && '-x86_64' || '' }}
          path: ${{ steps.artifacts.outputs.paths }}

  android:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      ANDROID_API_LEVEL: '36'
      ANDROID_BUILD_TOOLS_VERSION: '36.1.0'
      ANDROID_NDK_VERSION: '27.2.12479018'
      IRONWING_APTABASE_KEY: ${{ vars.IRONWING_APTABASE_KEY }}
      IRONWING_APTABASE_HOST: ${{ vars.IRONWING_APTABASE_HOST }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Configure Android NDK
        run: |
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> "$GITHUB_ENV"
          echo "NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Android APK
        run: pnpm run build:android

      - name: Resolve Android artifact paths
        id: android-artifacts
        shell: bash
        run: |
          mapfile -t paths < <(find src-tauri/gen/android/app/build/outputs -type f \( -name '*.apk' -o -name '*.aab' \))
          if [ "${#paths[@]}" -eq 0 ]; then
            echo "No Android artifacts found" >&2
            exit 1
          fi

          printf '%s\n' "${paths[@]}"
          {
            echo "paths<<EOF"
            printf '%s\n' "${paths[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Android artifacts to release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_PATHS: ${{ steps.android-artifacts.outputs.paths }}
        run: |
          while IFS= read -r artifact; do
            gh release upload "$GITHUB_REF_NAME" "$artifact" --clobber
          done <<< "$ARTIFACT_PATHS"

      - name: Upload Android build artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ironwing-android-apk
          path: ${{ steps.android-artifacts.outputs.paths }}
